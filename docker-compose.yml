# =============================================================================
# M365 Enterprise Control Center — local development compose
#
# Phase 1: real api / web / worker services build from apps/<name>.
# Infra: Postgres, Redis, OpenSearch, MinIO, Mailhog.
#
# Quickstart:
#   cp .env.example .env
#   docker compose up -d
#   docker compose exec api alembic upgrade head
#   docker compose exec api python -m app.scripts.seed
#   open http://localhost:3000
# =============================================================================

name: tg365

networks:
  tg365:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  opensearch-data:
  minio-data:

services:
  # ---------------------------------------------------------------------------
  # Postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: tg365-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg365}
      POSTGRES_USER: ${POSTGRES_USER:-tg365}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tg365} -d ${POSTGRES_DB:-tg365}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [tg365]

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tg365-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [tg365]

  # ---------------------------------------------------------------------------
  # OpenSearch
  # ---------------------------------------------------------------------------
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: tg365-opensearch
    restart: unless-stopped
    environment:
      - cluster.name=tg365-dev
      - node.name=tg365-os-1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "DISABLE_SECURITY_PLUGIN=true"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks: [tg365]

  # ---------------------------------------------------------------------------
  # MinIO
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: tg365-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tg365admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [tg365]

  # ---------------------------------------------------------------------------
  # Mailhog
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: tg365-mailhog
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks: [tg365]

  # ---------------------------------------------------------------------------
  # API — FastAPI
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./apps/api
      target: dev
    container_name: tg365-api
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      AUTH_MODE: ${AUTH_MODE:-mock}
      DEV_SESSION_SECRET: ${DEV_SESSION_SECRET:-dev-insecure-do-not-use-in-prod-change-me-now}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3000}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8000}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tg365}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-tg365}
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_URL: http://opensearch:9200
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tg365admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [tg365]

  # ---------------------------------------------------------------------------
  # Worker — Dramatiq + APScheduler beat (role=all for local dev)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./apps/worker
    container_name: tg365-worker
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REDIS_URL: redis://redis:6379/0
      ROLE: all
    volumes:
      - ./apps/worker:/app
    depends_on:
      redis:
        condition: service_healthy
    networks: [tg365]

  # ---------------------------------------------------------------------------
  # Web — Next.js dev server
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      target: dev
    container_name: tg365-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
      NODE_ENV: development
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      api:
        condition: service_started
    networks: [tg365]
