name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api · lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy app
      - name: Pytest
        run: pytest -q

  worker:
    name: worker · lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/worker/requirements-dev.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - run: ruff check .
      - run: mypy app
      - run: pytest -q

  web:
    name: web · lint + typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package.json
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  pip_audit:
    name: pip-audit · CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      # Don't fail the build on CVEs we haven't triaged yet — surface them
      # as a warning so we can update the requirements pin in a follow-up
      # PR. Promote to a hard fail in Phase 32.
      - name: api requirements
        run: pip-audit -r apps/api/requirements.txt --strict || true
      - name: worker requirements
        run: pip-audit -r apps/worker/requirements.txt --strict || true

  compose:
    name: compose · config validates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cp .env.example .env
      - name: Validate compose files
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

  cypress:
    name: web · cypress smokes
    runs-on: ubuntu-latest
    needs: web
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package.json
      - run: npm install --no-audit --no-fund
      - name: Run Cypress against `next start`
        uses: cypress-io/github-action@v6
        with:
          working-directory: apps/web
          install: false
          build: npm run build
          start: npm run start
          wait-on: "http://localhost:3000"
          wait-on-timeout: 120
          browser: electron
          headed: false
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: apps/web/cypress/screenshots
          if-no-files-found: ignore
