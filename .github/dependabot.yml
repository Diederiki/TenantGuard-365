version: 2

updates:
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      # Pin majors deliberately to avoid surprise breaking changes; review
      # majors during the next planning slot.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: pip
    directory: /apps/worker
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
      types:
        patterns:
          - "@types/*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /apps/worker
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    labels:
      - dependencies
      - docker
